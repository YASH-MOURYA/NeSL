spring.application.name=Spring_Demo

# ===============================
# JSP Configuration
# ===============================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:mem:nesldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# SQL Initialization
# ===============================
spring.sql.init.mode=always

# ===============================
# H2 Console
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# Server Configuration
# ===============================
server.port=8080

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.name=SESSIONID

# ===============================
# SSL Configuration
# ===============================
server.ssl.enabled=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# ===============================
# Mail Configuration
# ===============================
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ===============================
# Google OAuth2 Login
# ===============================
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ===============================
# IMPORTANT:
# Disabled Temporary OAuth2 Resource Server
# to avoid test startup failures
# ===============================

# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-auth-server.com
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://your-auth-server.com/.well-known/jwks.json

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.example=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# Log File
# ===============================
logging.file.name=logs/spring-demo.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# Circular Reference Fix
# ===============================
spring.main.allow-circular-references=true